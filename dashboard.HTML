<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - HydroSmart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Hydro<span>Smart</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="features.html">Features</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <section class="section">
        <div class="container text-center">
            <h2>Live Cloud Dashboard</h2>
            <p class="subtitle">Monitor and control your irrigation network from anywhere in the world.</p>
            <div class="mock-dashboard">
                <div class="dash-header">System Status: <span class="status-active">Optimal</span></div>
                <div class="grid-3">
                    <div class="dash-metric"><h5>Moisture Level</h5><p>68%</p></div>
                    <div class="dash-metric"><h5>Water Used Today</h5><p>120 Liters</p></div>
                    <div class="dash-metric"><h5>Next Cycle</h5><p>05:00 AM</p></div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
